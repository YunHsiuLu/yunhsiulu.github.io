<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太陽系 3D 橢圓軌道模擬</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../classroom.css?v=20260629">
</head>
<body>
    <a href="../index.html#ORBIT" class="back-button">
        <span class="arrow">←</span>
    </a>
    <div class="container">
        <div class="simulation-box">
            <h3>太陽系軌道模擬 (包含哈雷彗星)</h3>
            <canvas id="simCanvas"></canvas>
            <div class="controls">
                <button id="toggleBtn">暫停 / 播放</button>
                <button id="resetBtn">重置視角與時間</button>
            </div>
            <p class="hint">操作提示：使用「滑鼠滾輪」縮放視野，按住「滑鼠左鍵」拖曳平移。</p>
        </div>

        <div class="info-panel">
            <h3>即時天文數據分析</h3>
            <div class="stats">
                <div class="stat-item"><span class="label">經過時間</span><br><span id="timeVal">0 Y, 0 D</span></div>
                <div class="stat-item"><span class="label">哈雷彗星速度</span><br><span id="halleySpeedVal">0</span> km/s</div>
                <div class="stat-item"><span class="label">地球速度</span><br><span id="earthSpeedVal">0</span> km/s</div>
            </div>
            
            <div class="chart-container">
                <canvas id="speedChart"></canvas>
            </div>

            <div class="settings">
                <div class="slider-header">
                    <span class="label">模擬倍速 (每幀運算次數): <strong id="speedValDisplay">24</strong></span>
                </div>
                <input type="range" id="speedSlider" min="1" max="400" step="1" value="24">
                <div class="slider-labels">
                    <span>1 (精細慢速)</span>
                    <span>400 (瘋狂加速)</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="../classroom.js?v=20260629"></script>
</body>
</html>

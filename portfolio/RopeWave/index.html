<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="拖曳繩端產生脈衝波，或用連續簡諧振源觀察正弦波、反射波與穿透波。">
  <title>繩波傳播模擬</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../classroom.css?v=20260629">
</head>
<body>
  <a href="../index.html" class="back-button" aria-label="回到模擬列表">
    <span class="arrow" aria-hidden="true">←</span>
  </a>

  <main class="lab-shell">
    <section class="stage-panel" aria-labelledby="page-title">
      <div class="title-row">
        <div>
          <p class="eyebrow">TRANSVERSE WAVE ON A STRING</p>
          <h1 id="page-title">繩波傳播模擬</h1>
        </div>
        <div class="readout" aria-live="polite">
          <span>繩長 <strong id="lengthReadout">1.00 m</strong></span>
          <span>波速 <strong id="speedReadout">1.00 m/s</strong></span>
          <span>時間 <strong id="timeReadout">0.0 s</strong></span>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="ropeCanvas" width="1200" height="520" aria-label="繩波傳播畫面"></canvas>
      </div>

      <div class="hint-bar">
        <span>手動：拖曳左端。振盪：連續正弦波。脈波：按形狀發射單次波。</span>
        <span>繩長 L = 4 m、波速 v = 1 m/s，駐波頻率 f<sub>n</sub> = n/8 Hz。</span>
        <span>組合繩：介面會同時出現反射波與穿透波。</span>
      </div>
    </section>

    <aside class="controls" aria-label="模擬控制">
      <section class="control-group">
        <h2>波源</h2>
        <div class="segmented" role="group" aria-label="波源模式">
          <button type="button" class="is-active" data-source="manual" aria-pressed="true">手動</button>
          <button type="button" data-source="oscillator" aria-pressed="false">振盪</button>
          <button type="button" data-source="pulse" aria-pressed="false">脈波</button>
        </div>
        <label class="slider-row">
          <span>振幅 <output id="amplitudeValue">70 px</output></span>
          <input id="amplitude" type="range" min="20" max="130" step="1" value="70">
        </label>
        <label class="slider-row">
          <span>頻率 <output id="frequencyValue">0.80 Hz</output></span>
          <input id="frequency" type="range" min="0.001" max="5" step="any" value="0.250">
        </label>
        <div class="harmonic-controls" aria-label="第 n 個駐波">
          <p>第 n 個駐波 <output id="harmonicFrequency">0.250 Hz</output></p>
          <div class="harmonic-picker">
            <button type="button" data-harmonic-step="-1" aria-label="降低駐波階數">−</button>
            <label>
              <span>n</span>
              <input id="harmonicOrder" type="number" min="1" max="40" step="1" value="2">
            </label>
            <button type="button" data-harmonic-step="1" aria-label="提高駐波階數">＋</button>
            <button type="button" id="applyHarmonic">套用</button>
          </div>
        </div>
        <div class="pulse-controls" aria-label="脈波">
          <p>脈波</p>
          <div class="pulse-buttons">
            <button type="button" data-pulse="square">方波</button>
            <button type="button" data-pulse="triangle">三角波</button>
            <button type="button" data-pulse="sine">正弦波</button>
            <button type="button" data-pulse="half-sine">半正弦波</button>
          </div>
        </div>
      </section>

      <section class="control-group">
        <h2>繩子組合</h2>
        <label class="select-row">
          <span>介質</span>
          <select id="mediumMode">
            <option value="uniform">單一繩子</option>
            <option value="light-heavy">左輕右重</option>
            <option value="heavy-light">左重右輕</option>
          </select>
        </label>
        <label class="slider-row">
          <span>阻尼 <output id="dampingValue">0.4%</output></span>
          <input id="damping" type="range" min="0" max="1.5" step="0.1" value="0.4">
        </label>
      </section>

      <section class="control-group" id="boundaryGroup">
        <h2>右端邊界</h2>
        <div class="segmented vertical" role="group" aria-label="反射模式">
          <button type="button" data-boundary="fixed" aria-pressed="false">固定端</button>
          <button type="button" data-boundary="free" aria-pressed="false">鬆弛端</button>
          <button type="button" class="is-active" data-boundary="absorbing" aria-pressed="true">無邊界</button>
        </div>
      </section>

      <section class="control-group actions">
        <button type="button" id="pauseButton">暫停</button>
        <button type="button" id="resetButton">重設繩子</button>
      </section>
    </aside>
  </main>

  <script src="script.js"></script>
  <script src="../classroom.js?v=20260629"></script>
</body>
</html>

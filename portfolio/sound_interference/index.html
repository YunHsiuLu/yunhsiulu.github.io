<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聲波干涉模擬 - 清潔版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>同相聲波干涉圖 (白底簡約版)</h2>

    <canvas id="canvas" width="800" height="500"></canvas>

    <div class="legend">
        <div class="legend-item"><div class="line-black"></div> 腹線 (nλ) - 黑色實線</div>
        <div class="legend-item"><div class="line-gray"></div> 節線 ((n+0.5)λ) - 灰色虛線</div>
    </div>

    <div class="controls">
        <label>波長 (λ):</label>
        <input type="range" id="wavelength" min="15" max="120" value="45">
        <span class="value-display" id="wl-val">45</span>

        <label>波源距離 (d):</label>
        <input type="range" id="distance" min="20" max="450" value="180">
        <span class="value-display" id="d-val">180</span>
    </div>

    <script src="script.js"></script>
</body>
</html>

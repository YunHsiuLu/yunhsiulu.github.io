<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>駐波：橫波與縱波</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../classroom.css?v=20260630">
</head>
<body>
  <a href="../index.html#STANDING" class="back-button" aria-label="返回模擬列表">
    <span class="arrow" aria-hidden="true">←</span>
  </a>

  <main class="lab">
    <section class="intro">
      <p class="eyebrow">STANDING WAVE</p>
      <h1>駐波：橫波與縱波</h1>
      <p>兩個等振幅、等頻率、反向傳播的波疊加後，會形成位置固定的波節與波腹。切換橫波／縱波，可以比較「介質振動方向」和「波形空間分布」的差異。</p>
    </section>

    <section class="panel" aria-label="駐波模擬控制與畫布">
      <div class="canvas-wrap">
        <canvas id="waveCanvas" width="1100" height="520" aria-label="駐波模擬畫布"></canvas>
      </div>

      <aside class="controls">
        <label>
          顯示模式
          <select id="mode">
            <option value="transverse">橫波：上下振動</option>
            <option value="longitudinal">縱波：左右振動</option>
          </select>
        </label>

        <label>
          諧波數 n
          <input id="harmonic" type="range" min="1" max="6" step="1" value="2">
          <output id="harmonicValue">2</output>
        </label>

        <label>
          振幅
          <input id="amplitude" type="range" min="20" max="95" step="1" value="58">
          <output id="amplitudeValue">58</output>
        </label>

        <label>
          動畫速度
          <input id="speed" type="range" min="0.2" max="2.4" step="0.1" value="1.0">
          <output id="speedValue">1.0</output>
        </label>

        <label class="check">
          <input id="components" type="checkbox" checked>
          顯示兩個反向行進波
        </label>
      </aside>
    </section>

    <section class="notes" aria-label="教學提示">
      <article>
        <h2>波節</h2>
        <p>振幅永遠為零的位置。固定端繩波、管內聲波都可以用波節位置判斷允許的波長。</p>
      </article>
      <article>
        <h2>波腹</h2>
        <p>振幅最大的區域。縱波的波腹不是「上下最高」，而是粒子左右位移最大。</p>
      </article>
      <article>
        <h2>關鍵式</h2>
        <p>固定兩端時，弦長 L 內可容納 n 個半波長：<strong>L = nλ / 2</strong>。</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="../classroom.js?v=20260630"></script>
</body>
</html>

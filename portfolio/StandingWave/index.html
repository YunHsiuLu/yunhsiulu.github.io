<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>駐波：橫波與縱波</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../classroom.css?v=20260630">
</head>
<body>
  <a href="../index.html#STANDING" class="back-button" aria-label="返回模擬列表">
    <span class="arrow" aria-hidden="true">←</span>
  </a>

  <main class="lab">
    <section class="intro">
      <p class="eyebrow">STANDING WAVE</p>
      <h1>駐波：橫波與縱波</h1>
      <p>兩個等振幅、等頻率、反向傳播的波疊加後，會形成位置固定的波節與波腹。切換橫波／縱波，可以比較「介質振動方向」和「波形空間分布」的差異。</p>
    </section>

    <section class="panel" aria-label="駐波模擬控制與畫布">
      <div class="canvas-wrap">
        <canvas id="waveCanvas" width="1100" height="520" aria-label="駐波模擬畫布"></canvas>
      </div>

      <aside class="controls">
        <div class="button-row" aria-label="動畫播放控制">
          <button id="play" type="button" class="control-button">播放</button>
          <button id="pause" type="button" class="control-button">暫停</button>
          <button id="stepFrame" type="button" class="control-button">單影格</button>
        </div>

        <label>
          顯示模式
          <select id="mode">
            <option value="transverse">橫波：上下振動</option>
            <option value="longitudinal">縱波：管內聲波</option>
          </select>
        </label>

        <label>
          邊界條件
          <select id="boundary">
            <option value="closed-closed">兩邊節點（雙閉）</option>
            <option value="open-open">兩邊腹點（雙開）</option>
            <option value="closed-open">左節點、右腹點（一閉一開）</option>
          </select>
        </label>

        <label>
          模態序號 n
          <input id="harmonic" type="range" min="1" max="6" step="1" value="2">
          <output id="harmonicValue">2</output>
        </label>

        <label>
          振幅
          <input id="amplitude" type="range" min="20" max="95" step="1" value="58">
          <output id="amplitudeValue">58</output>
        </label>

        <label>
          動畫速度
          <input id="speed" type="range" min="0.2" max="2.4" step="0.1" value="1.0">
          <output id="speedValue">1.0</output>
        </label>

        <label class="check">
          <input id="components" type="checkbox" checked>
          顯示兩個反向行進波
        </label>

        <label class="check">
          <input id="standing" type="checkbox" checked>
          顯示駐波
        </label>

        <label class="check">
          <input id="guides" type="checkbox" checked>
          顯示腹點／節點輔助線
        </label>

        <div id="longitudinalOptions" class="longitudinal-options" hidden>
          <span>縱波橫向表示</span>
          <label class="check">
            <input id="pressurePlot" type="checkbox" checked>
            顯示氣壓分布圖
          </label>
          <label class="check">
            <input id="displacementPlot" type="checkbox" checked>
            顯示分子位移圖
          </label>
        </div>
      </aside>
    </section>

    <section class="notes" aria-label="教學提示">
      <article>
        <h2>波節</h2>
        <p>聲波的位移波節同時是氣壓波腹；封閉端屬於位移波節。</p>
      </article>
      <article>
        <h2>波腹</h2>
        <p>聲波的位移波腹同時是氣壓波節；開口端屬於位移波腹。</p>
      </article>
      <article>
        <h2>關鍵式</h2>
        <p>雙閉、雙開時：<strong>L = nλ / 2</strong>；一閉一開時：<strong>L = (2n − 1)λ / 4</strong>。</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="../classroom.js?v=20260630"></script>
</body>
</html>
